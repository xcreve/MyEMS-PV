name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to build, for example v2.2.1"
        required: true
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build ${{ matrix.component }} image
    if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-rc')) || (github.event_name == 'workflow_dispatch' && startsWith(inputs.release_tag, 'v') && !contains(inputs.release_tag, '-rc')) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            image: myems-pv-backend
            dockerfile: docker/backend/Dockerfile
          - component: frontend
            image: myems-pv-frontend
            dockerfile: docker/frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
          submodules: recursive

      - name: Prepare image metadata
        id: meta
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/${{ matrix.image }}"
          version="${RELEASE_TAG}"
          source_sha="$(git rev-parse HEAD)"
          {
            echo "image=${image}"
            echo "version=${version}"
            echo "tagged_image=${image}:${version}"
            echo "latest_image=${image}:latest"
            echo "source_sha=${source_sha}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.tagged_image }}
            ${{ steps.meta.outputs.latest_image }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.source_sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.version }}

      - name: Inspect pushed manifest
        id: inspect
        shell: bash
        run: |
          docker buildx imagetools inspect --raw "${{ steps.meta.outputs.tagged_image }}" > manifest.json
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import json

          with open("manifest.json", "r", encoding="utf-8") as fh:
              manifest = json.load(fh)

          digests = {}
          for item in manifest.get("manifests", []):
              platform = item.get("platform", {})
              if platform.get("os") == "linux" and platform.get("architecture") in {"amd64", "arm64"}:
                  digests[platform["architecture"]] = item.get("digest", "")

          print(f"amd64_digest={digests.get('amd64', '')}")
          print(f"arm64_digest={digests.get('arm64', '')}")
          PY

      - name: Record digest
        id: digest
        shell: bash
        run: |
          mkdir -p release-digests
          {
            echo "component=${{ matrix.component }}"
            echo "image=${{ steps.meta.outputs.tagged_image }}"
            echo "platforms=linux/amd64,linux/arm64"
            echo "digest=${{ steps.build.outputs.digest }}"
            echo "linux_amd64_digest=${{ steps.inspect.outputs.amd64_digest }}"
            echo "linux_arm64_digest=${{ steps.inspect.outputs.arm64_digest }}"
          } | tee "release-digests/${{ matrix.component }}.txt"
          echo "digest=${{ steps.build.outputs.digest }}" >> "${GITHUB_OUTPUT}"
          echo "linux_amd64_digest=${{ steps.inspect.outputs.amd64_digest }}" >> "${GITHUB_OUTPUT}"
          echo "linux_arm64_digest=${{ steps.inspect.outputs.arm64_digest }}" >> "${GITHUB_OUTPUT}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-digest-${{ matrix.component }}
          path: release-digests/${{ matrix.component }}.txt
          if-no-files-found: error

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.tagged_image }}
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          format: spdx-json
          artifact-name: sbom-${{ matrix.component }}-${{ steps.meta.outputs.version }}.spdx.json
          output-file: sbom-${{ matrix.component }}-${{ steps.meta.outputs.version }}.spdx.json
          upload-artifact: true
          upload-artifact-retention: 90
          upload-release-assets: false

      - name: Summary
        shell: bash
        run: |
          {
            echo "### ${{ matrix.component }} image"
            echo ""
            echo "- Image: \`${{ steps.meta.outputs.tagged_image }}\`"
            echo "- Platforms: \`linux/amd64,linux/arm64\`"
            echo "- Multi-arch digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- linux/amd64 digest: \`${{ steps.inspect.outputs.amd64_digest }}\`"
            echo "- linux/arm64 digest: \`${{ steps.inspect.outputs.arm64_digest }}\`"
            echo "- SBOM: \`sbom-${{ matrix.component }}-${{ steps.meta.outputs.version }}.spdx.json\` (action artifact)"
          } >> "${GITHUB_STEP_SUMMARY}"
