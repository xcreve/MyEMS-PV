services:
  mysql:
    image: mysql:8.4
    container_name: myems-mysql
    command:
      - mysqld
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-time-zone=+08:00
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-MyEMS@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ry-vue}
    ports:
      - "${MYSQL_PORT_FORWARD:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ../ruoyi-java-myems/sql:/opt/bootstrap/sql:ro
      - ./mysql/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: myems-redis
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12

  ruoyi-admin:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    container_name: myems-ruoyi-admin
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      JAVA_OPTS: >-
        -Dspring.profiles.active=${SPRING_PROFILES_ACTIVE:-druid}
        -Dspring.datasource.druid.master.url=jdbc:mysql://${MYSQL_HOST:-mysql}:3306/${MYSQL_DATABASE:-ry-vue}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=GMT%2B8
        -Dspring.datasource.druid.master.username=${MYSQL_USERNAME:-root}
        -Dspring.datasource.druid.master.password=${MYSQL_ROOT_PASSWORD:-MyEMS@2024}
        -Dspring.data.redis.host=${REDIS_HOST:-redis}
        -Dspring.data.redis.port=${REDIS_PORT:-6379}
        -Dspring.data.redis.password=${REDIS_PASSWORD:-}
        -Druoyi.profile=${RUOYI_PROFILE:-/data/ruoyi/uploadPath}
        -Dserver.port=8080
    ports:
      - "${BACKEND_PORT_FORWARD:-8080}:8080"
    volumes:
      - backend-upload:${RUOYI_PROFILE:-/data/ruoyi/uploadPath}

  ruoyi-vue3:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    container_name: myems-ruoyi-vue3
    depends_on:
      - ruoyi-admin
    ports:
      - "${FRONTEND_PORT_FORWARD:-80}:80"

volumes:
  mysql-data:
  redis-data:
  backend-upload:

